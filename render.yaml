databases:
  - name: tiktok-exchange-db
    databaseName: tiktok_exchange
    user: tiktok_user
    plan: free

services:
  - type: web
    name: tiktok-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    preDeployCommand: bash scripts/render-migrate.sh
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: tiktok-exchange-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: tiktok-exchange-frontend
    runtime: static
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && NODE_ENV=production BASE_PATH=/ pnpm --filter @workspace/tiktok-exchange run build
    staticPublishPath: artifacts/tiktok-exchange/dist/public
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
